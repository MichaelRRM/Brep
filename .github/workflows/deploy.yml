name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/brep-api
  FRONT_IMAGE: ghcr.io/${{ github.repository_owner }}/brep-front

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Brep.WebApi/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:latest,${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Brep.Front
          file: Brep.Front/Dockerfile
          push: true
          tags: ${{ env.FRONT_IMAGE }}:latest,${{ env.FRONT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=front
          cache-to: type=gha,mode=max,scope=front

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --name brep-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name brep-front \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.FRONT_IMAGE }}:${{ github.sha }}
